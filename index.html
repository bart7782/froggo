<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Weather Frog - Phase 1</title>
  <style>
    :root {
      --sky-day: linear-gradient(180deg, #7ec8ff 0%, #d8f3ff 100%);
      --sky-night: linear-gradient(180deg, #101935 0%, #1f2a56 100%);
      --grass: #7cc46b;
      --house-wall: #f6d7b0;
      --house-roof: #a64b3a;
      --text: #1b1f24;
      --panel: rgba(255, 255, 255, 0.75);
      --storm-overlay: rgba(41, 44, 62, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #101935;
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    #app {
      width: min(1100px, 100%);
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #weather-scene {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--sky-day);
      transition: background 600ms ease;
    }

    .scene-ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 35%;
      background: var(--grass);
    }

    .scene-sun,
    .scene-moon {
      position: absolute;
      top: 8%;
      right: 10%;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      transition: opacity 400ms ease;
    }

    .scene-sun {
      background: radial-gradient(circle at 35% 30%, #fffde7, #ffd447 60%, #fcbf2c);
      box-shadow: 0 0 40px rgba(255, 204, 51, 0.7);
      opacity: 1;
    }

    .scene-moon {
      background: radial-gradient(circle at 30% 30%, #ffffff, #ccd5ff 70%);
      box-shadow: 0 0 30px rgba(210, 220, 255, 0.5);
      opacity: 0;
    }

    .house {
      position: absolute;
      left: 10%;
      bottom: 20%;
      width: 260px;
      height: 220px;
    }

    .house__roof {
      position: absolute;
      left: 25px;
      top: 0;
      width: 0;
      height: 0;
      border-left: 105px solid transparent;
      border-right: 105px solid transparent;
      border-bottom: 90px solid var(--house-roof);
    }

    .house__body {
      position: absolute;
      left: 20px;
      top: 85px;
      width: 220px;
      height: 130px;
      background: var(--house-wall);
      border: 3px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }

    .house__door {
      position: absolute;
      bottom: 0;
      left: 95px;
      width: 36px;
      height: 65px;
      background: #8c6c52;
      border-radius: 8px 8px 0 0;
    }

    .house__window {
      position: absolute;
      top: 25px;
      width: 38px;
      height: 38px;
      background: #9fd4ff;
      border: 2px solid #5f7a8f;
    }

    .house__window--left { left: 36px; }
    .house__window--right { right: 36px; }

    .character {
      position: absolute;
      left: 43%;
      bottom: 24%;
      width: 100px;
      height: 120px;
      transform-origin: center bottom;
      animation: idle-bounce 3s ease-in-out infinite;
    }

    .character__body {
      position: absolute;
      inset: 26px 10px 10px;
      background: #41b35d;
      border-radius: 45% 45% 38% 38%;
      border: 2px solid rgba(0, 0, 0, 0.2);
    }

    .character__eyes {
      position: absolute;
      top: 12px;
      left: 18px;
      width: 64px;
      display: flex;
      justify-content: space-between;
    }

    .character__eye {
      width: 18px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .character__eye::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 10px;
      background: #222;
      border-radius: 50%;
      left: 5px;
      top: 7px;
    }

    .character__mouth {
      position: absolute;
      left: 35px;
      top: 62px;
      width: 30px;
      height: 12px;
      border-bottom: 3px solid #1f5b2e;
      border-radius: 0 0 18px 18px;
    }

    .rain-layer,
    .storm-flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 350ms ease;
    }

    .rain-layer {
      overflow: hidden;
    }

    .raindrop {
      position: absolute;
      top: -15%;
      width: 2px;
      height: 28px;
      background: rgba(219, 239, 255, 0.8);
      animation: fall linear infinite;
    }

    .storm-flash {
      background: var(--storm-overlay);
    }

    .is-rainy .rain-layer,
    .is-stormy .rain-layer {
      opacity: 1;
    }

    .is-stormy .storm-flash {
      opacity: 1;
      animation: storm-pulse 2.4s infinite;
    }

    .is-night {
      background: var(--sky-night) !important;
    }

    .is-night .scene-sun {
      opacity: 0;
    }

    .is-night .scene-moon {
      opacity: 1;
    }

    #status-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 270px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      font-size: 0.92rem;
      line-height: 1.35;
    }

    #status-panel strong {
      font-size: 0.95rem;
    }

    #debug-controls {
      position: absolute;
      right: 12px;
      top: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .debug-btn {
      border: 1px solid rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    @keyframes fall {
      to {
        transform: translateY(130vh) translateX(-15px);
      }
    }

    @keyframes idle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes storm-pulse {
      0%, 85%, 100% { filter: brightness(1); }
      88% { filter: brightness(2.1); }
      90% { filter: brightness(1.2); }
      92% { filter: brightness(2.6); }
    }
  </style>
</head>
<body>
  <main id="app">
    <section id="weather-scene" class="weather-scene is-sunny">
      <div class="scene-sun" aria-hidden="true"></div>
      <div class="scene-moon" aria-hidden="true"></div>

      <div id="house" class="house" aria-label="House Location Placeholder">
        <div class="house__roof"></div>
        <div class="house__body">
          <div class="house__window house__window--left"></div>
          <div class="house__window house__window--right"></div>
          <div class="house__door"></div>
        </div>
      </div>

      <div id="frog" class="character" aria-label="Character Placeholder">
        <div class="character__body"></div>
        <div class="character__eyes">
          <span class="character__eye"></span>
          <span class="character__eye"></span>
        </div>
        <div class="character__mouth"></div>
      </div>

      <div id="rain-layer" class="rain-layer" aria-hidden="true"></div>
      <div class="storm-flash" aria-hidden="true"></div>
      <div class="scene-ground"></div>

      <aside id="status-panel" aria-live="polite">
        <div><strong>Location:</strong> <span id="status-location"></span></div>
        <div><strong>Weather:</strong> <span id="status-weather"></span></div>
        <div><strong>Time:</strong> <span id="status-time"></span></div>
        <div><strong>Activity:</strong> <span id="status-activity"></span></div>
        <div><strong>Event Ends:</strong> <span id="status-event-end"></span></div>
      </aside>

      <div id="debug-controls" aria-label="Testing controls">
        <button class="debug-btn" data-weather="sunny">Sunny</button>
        <button class="debug-btn" data-weather="rainy">Rainy</button>
        <button class="debug-btn" data-weather="stormy">Stormy</button>
        <button class="debug-btn" data-time="day">Day</button>
        <button class="debug-btn" data-time="night">Night</button>
        <button class="debug-btn" id="force-update">Force Update</button>
      </div>
    </section>
  </main>

  <script>
    // ============================
    // Home Assistant integration note:
    // Replace mockEnvironment.weather and mockEnvironment.timeOfDay using HA API/sensors,
    // then call stateMachine.updateEnvironment(newWeather, newTimeOfDay).
    // ============================

    const mockEnvironment = {
      weather: "sunny", // allowed: sunny | rainy | stormy
      timeOfDay: "day", // allowed: day | night
      now: () => new Date()
    };

    const ACTIVITY_CONFIG = {
      house: {
        day: {
          sunny: [
            "Watering porch plants",
            "Tidying the living room"
          ],
          rainy: [
            "Looking out the window with tea",
            "Reading a cozy book indoors"
          ],
          stormy: [
            "Hiding under a blanket",
            "Listening to thunder safely inside"
          ]
        },
        night: {
          sunny: [
            "Stargazing near the porch",
            "Preparing for bedtime"
          ],
          rainy: [
            "Listening to rain from bed",
            "Reading by a warm lamp"
          ],
          stormy: [
            "Hiding under the covers",
            "Staying tucked in during the storm"
          ]
        }
      }
    };

    // ============================
    // STATE MACHINE (Phase 1 core)
    // Manages: currentLocation, currentActivity, eventEndTime
    // ============================
    const stateMachine = {
      state: {
        currentLocation: "house",
        currentActivity: "Booting...",
        eventEndTime: null,
        weather: mockEnvironment.weather,
        timeOfDay: mockEnvironment.timeOfDay
      },

      updateEnvironment(weather, timeOfDay) {
        const validWeather = ["sunny", "rainy", "stormy"];
        const validTime = ["day", "night"];

        if (validWeather.includes(weather)) this.state.weather = weather;
        if (validTime.includes(timeOfDay)) this.state.timeOfDay = timeOfDay;

        this.updateActivity("environment_change");
      },

      updateActivity(trigger = "interval") {
        const now = mockEnvironment.now();

        // Future-proof for Phase 2 special events: keep active event until eventEndTime
        if (this.state.eventEndTime && now < this.state.eventEndTime) {
          renderScene(this.state);
          return;
        }

        // For Phase 1, we only use ambient activities at location "house"
        this.state.currentLocation = "house";
        this.state.eventEndTime = null;

        const options =
          ACTIVITY_CONFIG[this.state.currentLocation]?.[this.state.timeOfDay]?.[this.state.weather] ||
          ["Relaxing quietly"];

        this.state.currentActivity = chooseRandom(options) + ` (${trigger})`;
        renderScene(this.state);
      }
    };

    const sceneEl = document.getElementById("weather-scene");
    const rainLayer = document.getElementById("rain-layer");

    const statusLocation = document.getElementById("status-location");
    const statusWeather = document.getElementById("status-weather");
    const statusTime = document.getElementById("status-time");
    const statusActivity = document.getElementById("status-activity");
    const statusEventEnd = document.getElementById("status-event-end");

    function chooseRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function renderScene(state) {
      sceneEl.classList.toggle("is-night", state.timeOfDay === "night");
      sceneEl.classList.toggle("is-rainy", state.weather === "rainy");
      sceneEl.classList.toggle("is-stormy", state.weather === "stormy");

      // reset mutually exclusive weather class helpers
      sceneEl.classList.toggle("is-sunny", state.weather === "sunny");

      statusLocation.textContent = state.currentLocation;
      statusWeather.textContent = state.weather;
      statusTime.textContent = state.timeOfDay;
      statusActivity.textContent = state.currentActivity;
      statusEventEnd.textContent = state.eventEndTime
        ? state.eventEndTime.toLocaleTimeString()
        : "none";
    }

    function buildRainDrops(count = 90) {
      const fragment = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const drop = document.createElement("span");
        drop.className = "raindrop";
        drop.style.left = `${Math.random() * 100}%`;
        drop.style.animationDuration = `${0.8 + Math.random() * 0.9}s`;
        drop.style.animationDelay = `${Math.random() * 1.6}s`;
        drop.style.opacity = `${0.5 + Math.random() * 0.5}`;
        fragment.appendChild(drop);
      }
      rainLayer.replaceChildren(fragment);
    }

    function initDebugControls() {
      const controls = document.getElementById("debug-controls");
      controls.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;

        const weather = target.dataset.weather;
        const time = target.dataset.time;

        if (weather) {
          mockEnvironment.weather = weather;
          stateMachine.updateEnvironment(weather, stateMachine.state.timeOfDay);
          return;
        }

        if (time) {
          mockEnvironment.timeOfDay = time;
          stateMachine.updateEnvironment(stateMachine.state.weather, time);
          return;
        }

        if (target.id === "force-update") {
          stateMachine.updateActivity("manual_trigger");
        }
      });
    }

    buildRainDrops();
    initDebugControls();

    // First render
    stateMachine.updateActivity("startup");

    // Update every 3 minutes, or manually via updateEnvironment()
    setInterval(() => {
      stateMachine.updateActivity("interval");
    }, 3 * 60 * 1000);
  </script>
</body>
</html>

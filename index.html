<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Weather Frog Clone - Phase 1</title>
  <style>
    :root {
      --sky-day: #8fd8ff;
      --sky-rain: #7f93a6;
      --sky-storm: #2f3b4f;
      --ground: #4f8a4b;
      --panel: #ffffffee;
      --text: #1a2230;
      --frog: #53c55a;
      --frog-light: #9fe88f;
      --rain-color: #d7ecff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #101826;
      color: var(--text);
      padding: 14px;
    }
    #app {
      width: min(1080px, 100%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px #0009;
      background: #eaf5ff;
    }
    #scene {
      position: relative;
      min-height: 480px;
      background: linear-gradient(180deg, var(--sky-day) 0 60%, var(--ground) 60% 100%);
      transition: background 300ms linear;
    }
    #scene.rainy { background: linear-gradient(180deg, var(--sky-rain) 0 60%, var(--ground) 60% 100%); }
    #scene.stormy { background: linear-gradient(180deg, var(--sky-storm) 0 60%, #3f6a3c 60% 100%); }

    /* Environmental effects */
    .sun {
      position: absolute;
      top: 32px;
      right: 50px;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff9b3, #ffcf33 72%);
      box-shadow: 0 0 28px #ffd95a;
    }
    #scene.rainy .sun, #scene.stormy .sun { opacity: 0.2; }
    .rain-layer {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }
    #scene.rainy .rain-layer, #scene.stormy .rain-layer { opacity: 1; }
    .rain-layer::before {
      content: "";
      position: absolute;
      inset: -130% 0 0;
      background-image: repeating-linear-gradient(110deg, transparent 0 22px, var(--rain-color) 22px 24px, transparent 24px 44px);
      animation: rain-fall 1000ms linear infinite;
    }
    #scene.stormy::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      animation: lightning 5s infinite;
    }

    /* Location placeholder (Phase 1: only house) */
    #location-art {
      position: absolute;
      left: 7%;
      bottom: 18%;
      width: 280px;
      height: 210px;
    }
    .house {
      position: absolute;
      inset: 0;
    }
    .house .roof {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-bottom: 92px solid #94572e;
    }
    .house .wall {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 142px;
      border: 4px solid #7b4f2e;
      border-radius: 10px;
      background: #f3e1c5;
    }

    /* Character */
    #frog {
      position: absolute;
      left: 56%;
      bottom: 18%;
      width: 110px;
      height: 100px;
      animation: frog-bob 3s ease-in-out infinite;
    }
    .frog-body {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 88px;
      height: 70px;
      border-radius: 40px 40px 28px 28px;
      background: var(--frog);
      box-shadow: 0 7px #0003;
    }
    .frog-belly {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      width: 58px;
      height: 39px;
      border-radius: 24px;
      background: var(--frog-light);
    }
    .frog-eye {
      position: absolute;
      top: 7px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #2f7033;
    }
    .frog-eye.left { left: 20px; }
    .frog-eye.right { right: 20px; }

    #hud {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      padding: 12px;
      background: var(--panel);
      border-top: 1px solid #0002;
    }
    .card { border: 1px solid #0002; border-radius: 10px; padding: 10px; }
    .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; color: #33475f; font-weight: 700; }
    .value { margin-top: 4px; font-weight: 700; }

    @keyframes rain-fall { to { transform: translateY(58%); } }
    @keyframes lightning {
      0%, 45%, 100% { background: transparent; }
      46% { background: #fff6; }
      47% { background: transparent; }
      68% { background: #fff3; }
      69% { background: transparent; }
    }
    @keyframes frog-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    @media (max-width: 820px) { #hud { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <main id="app">
    <section id="scene" class="sunny" aria-label="weather-scene">
      <div class="sun" aria-hidden="true"></div>
      <div class="rain-layer" aria-hidden="true"></div>
      <div id="location-art" aria-hidden="true"></div>
      <div id="frog" aria-label="frog character">
        <div class="frog-eye left"></div>
        <div class="frog-eye right"></div>
        <div class="frog-body"></div>
        <div class="frog-belly"></div>
      </div>
    </section>

    <section id="hud">
      <article class="card"><div class="label">Location</div><div id="v-location" class="value">house</div></article>
      <article class="card"><div class="label">Activity</div><div id="v-activity" class="value">...</div></article>
      <article class="card"><div class="label">Weather</div><div id="v-weather" class="value">sunny</div></article>
      <article class="card"><div class="label">Time</div><div id="v-time" class="value">day</div></article>
    </section>
  </main>

  <script>
    /**
     * HOME ASSISTANT INTEGRATION POINT (Phase 1)
     * Later you can call: window.updateFromHA({ weather: 'rainy', timeOfDay: 'night' })
     */

    // --- External/Context State (easy to update from HA later) ---
    const envContext = { weather: 'sunny', timeOfDay: 'day' };

    // --- Finite State Machine (FSM) core app state ---
    const machineState = {
      currentLocation: 'house',
      currentActivity: 'Booting...',
      eventEndTime: 0,
      mode: 'ambient' // ambient | special (special will be used in phase 2)
    };

    // --- Phase 1 Activity mapping (house-only) ---
    const ACTIVITY_MAP = {
      house: {
        sunny: { day: ['Walking in the garden', 'Hanging up laundry', 'Blowing bubbles'], night: ['Relaxing on the porch'] },
        rainy: { day: ['Looking out the window'], night: ['Reading a book with a lamp'] },
        stormy: { day: ['Hiding under the covers'], night: ['Hiding under the covers'] }
      }
    };

    // Processed appendix for Phase 2 integration (kept ready in-context now)
    const PHASE2_APPENDIX = {
      specialEvents: {
        sunny: ['Zuiderzeemuseum', 'Boat Trip'],
        anyWeather: ['Rijksmuseum', 'Naturalis', 'Spoorwegmuseum', 'Van Gogh Museum']
      },
      locations: ['house', 'hill', 'Zuiderzeemuseum', 'Boat Trip', 'Rijksmuseum', 'Naturalis', 'Spoorwegmuseum', 'Van Gogh Museum'],
      easterEggs: ['party-hat-cake', 'friend-visit', 'night-ufo']
    };

    const ui = {
      scene: document.getElementById('scene'),
      locationArt: document.getElementById('location-art'),
      vLocation: document.getElementById('v-location'),
      vActivity: document.getElementById('v-activity'),
      vWeather: document.getElementById('v-weather'),
      vTime: document.getElementById('v-time')
    };

    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

    function drawLocation(location) {
      if (location !== 'house') return;
      ui.locationArt.innerHTML = '<div class="house"><div class="roof"></div><div class="wall"></div></div>';
    }

    function applyWeatherVisuals() {
      ui.scene.classList.remove('sunny', 'rainy', 'stormy');
      ui.scene.classList.add(envContext.weather);
    }

    // ----------------- STATE MACHINE TRANSITION -----------------
    function transitionTo(nextPartialState) {
      Object.assign(machineState, nextPartialState);
      render();
    }

    /**
     * updateActivity(): called on interval or env updates.
     * - If event is still active, keep current state.
     * - Else pick a new valid ambient activity based on weather/time.
     */
    function updateActivity(force = false) {
      const now = Date.now();
      if (!force && now < machineState.eventEndTime) {
        return render();
      }

      const locationPool = ACTIVITY_MAP[machineState.currentLocation] || ACTIVITY_MAP.house;
      const weatherPool = locationPool[envContext.weather] || locationPool.sunny;
      const activityOptions = weatherPool[envContext.timeOfDay] || weatherPool.day || ['Idle'];

      transitionTo({
        currentActivity: rand(activityOptions),
        eventEndTime: now + (3 + Math.floor(Math.random() * 4)) * 60 * 1000, // 3-6 min
        mode: 'ambient'
      });
    }

    function render() {
      applyWeatherVisuals();
      drawLocation(machineState.currentLocation);
      ui.vLocation.textContent = machineState.currentLocation;
      ui.vActivity.textContent = machineState.currentActivity;
      ui.vWeather.textContent = envContext.weather;
      ui.vTime.textContent = envContext.timeOfDay;
    }

    // Expose to Home Assistant integration later
    function updateFromHA(partial) {
      Object.assign(envContext, partial);
      updateActivity(true);
    }
    window.updateFromHA = updateFromHA;

    // Demo ticker: switch time-of-day every 30s (for testing visuals/activities)
    setInterval(() => {
      envContext.timeOfDay = envContext.timeOfDay === 'day' ? 'night' : 'day';
      updateActivity(true);
    }, 30000);

    // Main activity loop: run every 2 minutes
    setInterval(() => updateActivity(false), 2 * 60 * 1000);

    // Initial bootstrap
    render();
    updateActivity(true);
  </script>
</body>
</html>

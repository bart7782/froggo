<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Frog Clone - Full Integration (Phase 2)</title>
  <style>
    :root {
      --sky-day:#87ceeb; --sky-night:#102040; --sky-rain:#71849a; --sky-storm:#283548;
      --ground:#4f8f4b; --panel:#f6f9ffff; --text:#11233d; --muted:#3c5167;
      --frog:#57d55d; --frog-light:#a9e88f;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1733;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:12px}
    #app{width:min(1260px,100%);border-radius:18px;overflow:hidden;box-shadow:0 24px 60px #0008;background:#e8f5ff}
    #scene{position:relative;min-height:560px;overflow:hidden;background:linear-gradient(180deg,var(--sky-day) 0 58%,var(--ground) 58% 100%);transition:background .4s ease}
    #scene.rainy{background:linear-gradient(180deg,var(--sky-rain) 0 58%,var(--ground) 58% 100%)}
    #scene.stormy{background:linear-gradient(180deg,var(--sky-storm) 0 58%,#3f6f3d 58% 100%)}
    #scene.is-night{background:linear-gradient(180deg,var(--sky-night) 0 58%,#3f6f3d 58% 100%)}

    .sun,.moon{position:absolute;top:24px;right:44px;width:96px;height:96px;border-radius:50%;transition:opacity .3s}
    .sun{background:radial-gradient(circle at 36% 32%,#fff2ad,#ffd138 75%);box-shadow:0 0 32px #ffd55e}
    .moon{background:#dbe9ff;box-shadow:inset -16px -9px 0 #b5cae8,0 0 24px #c1d5ff88;opacity:0}
    #scene.is-night .sun{opacity:0} #scene.is-night .moon{opacity:1}

    .clouds{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .25s}
    .clouds .cloud{position:absolute;background:#fff8;border-radius:30px;filter:blur(.2px)}
    .cloud1{left:8%;top:74px;width:124px;height:40px}.cloud2{left:26%;top:98px;width:176px;height:48px}.cloud3{left:70%;top:90px;width:144px;height:42px}
    #scene.cloudy .clouds,#scene.rainy .clouds,#scene.stormy .clouds{opacity:1}

    .rain-layer{position:absolute;inset:0;pointer-events:none;opacity:0}
    #scene.rainy .rain-layer,#scene.stormy .rain-layer{opacity:1}
    .rain-layer::before,.rain-layer::after{content:"";position:absolute;inset:-130% 0 0;background-image:repeating-linear-gradient(112deg,transparent 0 20px,#d8ecffdd 20px 22px,transparent 22px 42px);animation:rain 1s linear infinite}
    .rain-layer::after{opacity:.55;animation-duration:1.3s;inset:-145% 0 0}
    #scene.stormy::after{content:"";position:absolute;inset:0;pointer-events:none;animation:lightning 4.8s infinite}

    #location-art{position:absolute;left:7%;bottom:18%;width:360px;height:250px;transition:opacity .3s,transform .3s}
    #location-art.traveling{opacity:.3;transform:translateY(8px) scale(.98)}
    .house,.hill,.museum,.boat,.harbor{position:absolute;inset:0}
    .house .roof{position:absolute;left:50%;top:0;transform:translateX(-50%);width:0;height:0;border-left:180px solid transparent;border-right:180px solid transparent;border-bottom:108px solid #9a5f31}
    .house .wall{position:absolute;bottom:10px;left:12px;right:12px;height:170px;background:#e6d6b7;border:5px solid #7a4f2e;border-radius:12px}
    .house .door{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:76px;height:106px;background:#8a613d;border:4px solid #664225;border-radius:12px 12px 4px 4px}
    .house .window{position:absolute;top:122px;width:48px;height:48px;background:#b7e4ff;border:3px solid #7a4f2e}.house .w1{left:52px}.house .w2{right:52px}

    .hill .m1,.hill .m2{position:absolute;bottom:0;border-radius:120px 120px 0 0}
    .hill .m1{left:20px;width:190px;height:150px;background:#5e8d4b}.hill .m2{left:170px;width:190px;height:185px;background:#75aa5e}
    .hill .tree{position:absolute;left:242px;bottom:94px;width:18px;height:74px;background:#7d4c27}.hill .tree::after{content:"";position:absolute;left:-26px;top:-48px;width:70px;height:70px;background:#3c803f;border-radius:50%}

    .museum{background:#ece2d0;border:4px solid #6a4b2e;border-radius:10px;display:grid;place-items:center;overflow:hidden}
    .museum::before{content:"";position:absolute;top:10px;left:16px;right:16px;height:28px;background:#d2bc9f;border-radius:4px}
    .museum .columns{display:flex;gap:18px;position:absolute;bottom:0;top:42px;left:42px;right:42px;align-items:flex-end;justify-content:center}
    .museum .columns i{display:block;width:20px;height:150px;background:#f7efe0;border:2px solid #c6ab89;border-bottom:none}
    .museum .label{position:absolute;bottom:14px;font-weight:900;background:#fff8;padding:4px 10px;border-radius:8px}
    .harbor{background:linear-gradient(#a6d5f3 0 56%,#4e81ab 56%);border-radius:12px;border:3px solid #3f5f7e}
    .harbor .house-row{position:absolute;bottom:46%;left:14px;right:14px;height:70px;background:repeating-linear-gradient(90deg,#d8a37a 0 44px,#c07f58 44px 88px)}
    .harbor .boat-mini{position:absolute;bottom:16%;left:42%;width:130px;height:28px;background:#7f4b2d;border-radius:0 0 20px 20px}.harbor .boat-mini::before{content:"";position:absolute;left:50%;bottom:28px;width:4px;height:56px;background:#f4f4f4}
    .harbor .boat-mini::after{content:"";position:absolute;left:54%;bottom:44px;border-left:0;border-right:34px solid transparent;border-bottom:26px solid #f8f8f8}
    .boat{background:linear-gradient(#9fd0ef 0 62%,#4f7da5 62%);border-radius:12px;border:3px solid #3a607c}
    .boat .deck{position:absolute;left:46px;right:46px;bottom:30px;height:36px;background:#8e5a38;border-radius:0 0 18px 18px}
    .boat .mast{position:absolute;left:50%;bottom:66px;transform:translateX(-50%);width:6px;height:120px;background:#ececec}
    .boat .sail{position:absolute;left:50%;bottom:114px;transform:translateX(-50%);border-right:70px solid transparent;border-bottom:54px solid #fff}

    #activity-props{position:absolute;left:48%;bottom:18%;min-width:190px;height:170px;pointer-events:none}
    .prop{position:absolute;opacity:0;transform:translateY(8px) scale(.95);transition:all .25s}
    .prop.show{opacity:1;transform:translateY(0) scale(1)}
    .book{left:-20px;bottom:0;font-size:56px}.bed{left:-40px;bottom:0;font-size:72px}.kite{left:70px;bottom:78px;font-size:50px;animation:kite 1.8s ease-in-out infinite}
    .easel{left:26px;bottom:10px;font-size:70px}.bubble{left:70px;bottom:20px;font-size:58px;animation:float 2s ease-in infinite}
    .binocular{left:24px;bottom:22px;font-size:52px}.umbrella{left:28px;bottom:24px;font-size:64px}.telescope{left:16px;bottom:14px;font-size:62px}
    .captain{left:10px;bottom:18px;font-size:60px}.marshmallow{left:66px;bottom:10px;font-size:50px}.windowlook{left:25px;bottom:22px;font-size:60px}

    #frog{position:absolute;left:58%;bottom:18%;width:126px;height:116px;transition:transform .3s ease;animation:bob 3s ease-in-out infinite}
    #frog.pose-sleep{transform:rotate(-8deg) translateY(10px)}
    #frog.pose-hide{transform:scale(.95) translateY(14px)}
    #frog.pose-read{transform:translateY(-2px)}
    #frog.pose-kite{animation:hop 1.1s ease-in-out infinite}
    #frog.pose-paint{transform:translateX(-8px)}
    #frog.pose-steer{transform:translateX(10px)}
    #frog.pose-watch{transform:translateY(-6px)}
    #party-hat{position:absolute;left:50%;top:-26px;transform:translateX(-50%);display:none;font-size:30px}
    #party-hat.show{display:block}
    .frog-eye{position:absolute;top:10px;width:26px;height:26px;border-radius:50%;background:#fff;border:3px solid #2f6f35}
    .frog-eye.left{left:24px}.frog-eye.right{right:24px}
    .frog-body{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:98px;height:78px;border-radius:44px 44px 30px 30px;background:var(--frog);box-shadow:0 8px #0003}
    .frog-belly{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:62px;height:42px;border-radius:24px;background:var(--frog-light)}

    #friend{position:absolute;right:13%;bottom:18%;font-size:52px;opacity:0;transform:translateY(8px);transition:all .26s}
    #friend.show{opacity:1;transform:translateY(0)}
    #ufo{position:absolute;left:-120px;top:56px;font-size:32px;opacity:0}
    #ufo.fly{opacity:1;animation:ufo 1.8s linear}

    #travel-overlay{position:absolute;inset:0;background:#0f1a2bcc;display:grid;place-items:center;color:#fff;font-weight:900;letter-spacing:.02em;opacity:0;pointer-events:none;transition:opacity .2s}
    #travel-overlay.show{opacity:1}

    #hud{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;padding:12px;background:var(--panel);border-top:1px solid #0002}
    .card{border:1px solid #0002;border-radius:10px;padding:10px;background:#fff}
    .label{font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:var(--muted)}
    .value{margin-top:4px;font-weight:800;line-height:1.2}
    .controls{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    button{border:1px solid #0003;border-radius:10px;background:#f7fbff;padding:5px 8px;font-weight:700;cursor:pointer}
    @keyframes rain{to{transform:translateY(58%)}}
    @keyframes lightning{0%,45%,100%{background:transparent}46%{background:#fff7}47%{background:transparent}66%{background:#fff4}67%{background:transparent}}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes ufo{0%{left:-120px;top:56px}100%{left:calc(100% + 120px);top:24px}}
    @keyframes kite{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes float{0%{transform:translateY(0) scale(.85)}100%{transform:translateY(-80px) scale(1.2);opacity:0}}
    @media(max-width:1100px){#hud{grid-template-columns:repeat(4,minmax(0,1fr))}}
  </style>
</head>
<body>
  <main id="app">
    <section id="scene" class="sunny" aria-label="weather scene">
      <div class="sun"></div><div class="moon"></div>
      <div class="clouds" aria-hidden="true"><div class="cloud cloud1"></div><div class="cloud cloud2"></div><div class="cloud cloud3"></div></div>
      <div class="rain-layer" aria-hidden="true"></div>
      <div id="location-art" aria-hidden="true"></div>
      <div id="activity-props" aria-hidden="true">
        <div class="prop bed" id="prop-bed">🛏️</div><div class="prop book" id="prop-book">📖</div><div class="prop kite" id="prop-kite">🪁</div>
        <div class="prop easel" id="prop-easel">🎨</div><div class="prop bubble" id="prop-bubble">🫧</div><div class="prop binocular" id="prop-binocular">🔭</div>
        <div class="prop umbrella" id="prop-umbrella">☂️</div><div class="prop telescope" id="prop-telescope">🔭</div><div class="prop captain" id="prop-captain">🧢⛵</div>
        <div class="prop marshmallow" id="prop-marshmallow">🔥🍡</div><div class="prop windowlook" id="prop-windowlook">🪟</div>
      </div>
      <div id="friend" aria-hidden="true">🦊</div>
      <div id="ufo" aria-hidden="true">🛸</div>
      <div id="frog" aria-label="frog character">
        <div id="party-hat" aria-hidden="true">🎉🍰</div>
        <div class="frog-eye left"></div><div class="frog-eye right"></div>
        <div class="frog-body"></div><div class="frog-belly"></div>
      </div>
      <div id="travel-overlay">Travelling to new location...</div>
    </section>

    <section id="hud">
      <article class="card"><div class="label">Location</div><div id="v-location" class="value">house</div></article>
      <article class="card"><div class="label">Activity</div><div id="v-activity" class="value">...</div></article>
      <article class="card"><div class="label">Event Type</div><div id="v-event" class="value">ambient</div></article>
      <article class="card"><div class="label">Weather</div><div id="v-weather" class="value">sunny</div></article>
      <article class="card"><div class="label">Time</div><div id="v-time" class="value">day</div></article>
      <article class="card"><div class="label">Virtual Clock</div><div id="v-clock" class="value">12:00</div></article>
      <article class="card"><div class="label">Controls</div><div class="controls">
        <button data-weather="sunny">Sunny</button><button data-weather="cloudy">Cloudy</button><button data-weather="rainy">Rainy</button><button data-weather="stormy">Stormy</button>
        <button data-time="day">Day</button><button data-time="night">Night</button><button id="new-day">Trigger New Day</button>
      </div></article>
    </section>
  </main>

  <script>
    const gameState={weather:'sunny',timeOfDay:'day',forecastGood:true,virtualMinutes:12*60,dayCounter:0};
    const machine={currentLocation:'house',currentActivity:'Booting...',eventEndTime:0,eventType:'ambient',pendingDayRoll:true,lastAmbientByLocation:{},easterEgg:{ufoUntil:0,friendUntil:0,partyUntil:0}};

    const HOME_BASE_LOCATIONS=['house','hill'];
    const SPECIAL_EVENTS=[
      {name:'Zuiderzeemuseum',weatherRule:'good',activities:['Walking past historic houses','Looking at boats']},
      {name:'Boat Trip',weatherRule:'good',activities:["Steering the boat with a captain\'s hat",'Looking through a telescope']},
      {name:'Rijksmuseum',weatherRule:'any',activities:["Admiring The Night Watch"]},
      {name:'Naturalis',weatherRule:'any',activities:['Looking at a T-Rex skeleton']},
      {name:'Spoorwegmuseum',weatherRule:'any',activities:['Standing next to a steam engine']},
      {name:'Van Gogh Museum',weatherRule:'any',activities:["Painting a Sunflowers parody"]}
    ];
    const ACTIVITY_MAP={
      house:{
        sunny:{day:['Walking in the garden','Hanging up laundry','Blowing bubbles'],night:['Relaxing on the porch']},
        clear:{night:['Sleeping in bed (inside)','Stargazing on the porch']},
        cloudy:{day:['Tidying the porch plants'],night:['Listening to quiet wind by the window']},
        rainy:{day:['Looking out the window'],night:['Reading a book with a lamp']},
        stormy:{day:['Hiding under the covers in bed'],night:['Hiding under the covers in bed']}
      },
      hill:{
        sunny:{day:['Picnic on a towel','Flying a kite','Painting on an easel'],night:['Watching the sunset glow']},
        clear:{night:['Looking through a telescope','Having a small campfire and roasting marshmallows']},
        cloudy:{day:['Birdwatching with binoculars'],night:['Birdwatching with binoculars']},
        rainy:{day:['Seeking shelter under a large mushroom'],night:['Seeking shelter under a large mushroom']},
        stormy:{day:['Clinging to a tree to avoid being blown away'],night:['Clinging to a tree to avoid being blown away']}
      }
    };

    const ui={
      scene:document.getElementById('scene'),locationArt:document.getElementById('location-art'),overlay:document.getElementById('travel-overlay'),
      vLocation:document.getElementById('v-location'),vActivity:document.getElementById('v-activity'),vEvent:document.getElementById('v-event'),vWeather:document.getElementById('v-weather'),vTime:document.getElementById('v-time'),vClock:document.getElementById('v-clock'),
      friend:document.getElementById('friend'),ufo:document.getElementById('ufo'),partyHat:document.getElementById('party-hat'),frog:document.getElementById('frog'),props:[...document.querySelectorAll('.prop')]
    };

    const rand=(arr)=>arr[Math.floor(Math.random()*arr.length)];
    const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

    function normalizedWeatherKey(){ return (gameState.timeOfDay==='night'&&gameState.weather==='sunny') ? 'clear' : gameState.weather; }
    function fmtClock(){const h=Math.floor(gameState.virtualMinutes/60)%24,m=gameState.virtualMinutes%60;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;}

    function setLocationVisual(location){
      const museum=(label)=>`<div class="museum"><div class="columns"><i></i><i></i><i></i><i></i><i></i></div><div class="label">${label}</div></div>`;
      if(location==='house') ui.locationArt.innerHTML='<div class="house"><div class="roof"></div><div class="wall"></div><div class="door"></div><div class="window w1"></div><div class="window w2"></div></div>';
      else if(location==='hill') ui.locationArt.innerHTML='<div class="hill"><div class="m1"></div><div class="m2"></div><div class="tree"></div></div>';
      else if(location==='Zuiderzeemuseum') ui.locationArt.innerHTML='<div class="harbor"><div class="house-row"></div><div class="boat-mini"></div></div>';
      else if(location==='Boat Trip') ui.locationArt.innerHTML='<div class="boat"><div class="deck"></div><div class="mast"></div><div class="sail"></div></div>';
      else if(location==='Rijksmuseum') ui.locationArt.innerHTML=museum('Rijksmuseum');
      else if(location==='Naturalis') ui.locationArt.innerHTML=museum('Naturalis');
      else if(location==='Spoorwegmuseum') ui.locationArt.innerHTML=museum('Spoorwegmuseum');
      else if(location==='Van Gogh Museum') ui.locationArt.innerHTML=museum('Van Gogh Museum');
    }

    function applyEnvironment(){
      ui.scene.classList.remove('sunny','cloudy','rainy','stormy','is-night');
      ui.scene.classList.add(gameState.weather);
      if(gameState.timeOfDay==='night') ui.scene.classList.add('is-night');
    }

    function applyActivityVisuals(activity){
      ui.props.forEach(p=>p.classList.remove('show'));
      ui.frog.className=''; ui.frog.id='frog';
      const show=(id)=>document.getElementById(id)?.classList.add('show');
      if(/sleep|covers|bed/i.test(activity)){ ui.frog.classList.add('pose-sleep'); show('prop-bed'); }
      else if(/book|reading/i.test(activity)){ ui.frog.classList.add('pose-read'); show('prop-book'); }
      else if(/window/i.test(activity)){ ui.frog.classList.add('pose-watch'); show('prop-windowlook'); }
      else if(/bubbles/i.test(activity)){ show('prop-bubble'); }
      else if(/kite/i.test(activity)){ ui.frog.classList.add('pose-kite'); show('prop-kite'); }
      else if(/painting|sunflowers/i.test(activity)){ ui.frog.classList.add('pose-paint'); show('prop-easel'); }
      else if(/birdwatching/i.test(activity)){ show('prop-binocular'); }
      else if(/shelter|rain|storm/i.test(activity)){ ui.frog.classList.add('pose-hide'); show('prop-umbrella'); }
      else if(/telescope|stargazing/i.test(activity)){ show('prop-telescope'); }
      else if(/captain|boat|steering/i.test(activity)){ ui.frog.classList.add('pose-steer'); show('prop-captain'); }
      else if(/campfire|marshmallows/i.test(activity)){ show('prop-marshmallow'); }
    }

    function pickAmbientActivity(location){
      const cfg=ACTIVITY_MAP[location]||ACTIVITY_MAP.house;
      const weatherCfg=cfg[normalizedWeatherKey()]||cfg.sunny;
      const list=weatherCfg[gameState.timeOfDay]||weatherCfg.day||weatherCfg.night||['Idle'];
      const prev=machine.lastAmbientByLocation[location];
      const candidates=(list.length>1&&prev)?list.filter(v=>v!==prev):list;
      const chosen=rand(candidates.length?candidates:list);
      machine.lastAmbientByLocation[location]=chosen;
      return chosen;
    }

    function maybeStartSpecialEvent(){
      if(!machine.pendingDayRoll) return false;
      machine.pendingDayRoll=false;
      if(Math.random()>0.10) return false;
      const good=gameState.forecastGood ?? (gameState.weather==='sunny');
      const allowed=SPECIAL_EVENTS.filter(e=>e.weatherRule==='any' || (e.weatherRule==='good'&&good));
      if(!allowed.length) return false;
      const event=rand(allowed);
      machine.currentLocation=event.name;
      machine.currentActivity=rand(event.activities);
      machine.eventType='special';
      machine.eventEndTime=Date.now()+((4+Math.floor(Math.random()*3))*60*60*1000);
      return true;
    }

    async function travelTo(location){
      ui.overlay.classList.add('show');
      ui.locationArt.classList.add('traveling');
      await sleep(360);
      machine.currentLocation=location;
      setLocationVisual(location);
      await sleep(360);
      ui.locationArt.classList.remove('traveling');
      ui.overlay.classList.remove('show');
    }

    async function updateActivity(force=false){
      const now=Date.now();
      if(machine.eventType==='special' && now<machine.eventEndTime && !force) return render();
      if(machine.eventType==='special' && now>=machine.eventEndTime){machine.eventType='ambient';machine.eventEndTime=0;await travelTo(rand(HOME_BASE_LOCATIONS));}
      if(maybeStartSpecialEvent()) return render();
      if(!force && now<machine.eventEndTime) return render();
      if(!HOME_BASE_LOCATIONS.includes(machine.currentLocation)) await travelTo(rand(HOME_BASE_LOCATIONS));
      const baseLocation=Math.random()<0.25?'hill':'house';
      if(machine.currentLocation!==baseLocation) await travelTo(baseLocation);
      machine.currentActivity=pickAmbientActivity(machine.currentLocation);
      machine.eventType='ambient';
      machine.eventEndTime=now+((6+Math.floor(Math.random()*10))*60*1000);
      render();
    }

    function runEasterEggs(){
      const now=Date.now();
      if(gameState.timeOfDay==='night' && now>=machine.easterEgg.ufoUntil && Math.random()<0.009){machine.easterEgg.ufoUntil=now+1400;ui.ufo.classList.remove('fly');void ui.ufo.offsetWidth;ui.ufo.classList.add('fly');}
      if(machine.currentLocation==='house' && now>=machine.easterEgg.partyUntil && Math.random()<0.009) machine.easterEgg.partyUntil=now+3600;
      if(machine.currentLocation!=='house' && now>=machine.easterEgg.friendUntil && Math.random()<0.009) machine.easterEgg.friendUntil=now+3200;
      ui.partyHat.classList.toggle('show',now<machine.easterEgg.partyUntil && machine.currentLocation==='house');
      ui.friend.classList.toggle('show',now<machine.easterEgg.friendUntil && machine.currentLocation!=='house');
    }

    function render(){
      applyEnvironment();
      setLocationVisual(machine.currentLocation);
      ui.vLocation.textContent=machine.currentLocation;
      ui.vActivity.textContent=machine.currentActivity;
      ui.vEvent.textContent=machine.eventType;
      ui.vWeather.textContent=gameState.weather;
      ui.vTime.textContent=gameState.timeOfDay;
      ui.vClock.textContent=fmtClock();
      applyActivityVisuals(machine.currentActivity);
      runEasterEggs();
    }

    async function updateFromHA(partial){Object.assign(gameState,partial);if(typeof gameState.forecastGood!=='boolean') gameState.forecastGood=(gameState.weather==='sunny');await updateActivity(true);}
    async function triggerNewDayCycle(){machine.pendingDayRoll=true;gameState.dayCounter+=1;await updateActivity(true);}
    window.updateFromHA=updateFromHA; window.triggerNewDayCycle=triggerNewDayCycle;

    document.querySelectorAll('button[data-weather]').forEach(b=>b.onclick=()=>updateFromHA({weather:b.dataset.weather,forecastGood:b.dataset.weather==='sunny'}));
    document.querySelectorAll('button[data-time]').forEach(b=>b.onclick=()=>updateFromHA({timeOfDay:b.dataset.time}));
    document.getElementById('new-day').onclick=()=>triggerNewDayCycle();

    // Virtual time intentionally kept active for now: +5 virtual minutes per second.
    setInterval(()=>updateActivity(false),3*60*1000);
    setInterval(()=>{
      const prev=gameState.virtualMinutes;
      gameState.virtualMinutes=(gameState.virtualMinutes+5)%(24*60);
      gameState.timeOfDay=(gameState.virtualMinutes>=6*60 && gameState.virtualMinutes<21*60)?'day':'night';
      if(gameState.virtualMinutes<prev){machine.pendingDayRoll=true;gameState.dayCounter+=1;}
      runEasterEggs(); render();
    },1000);

    render();
    updateActivity(true);
  </script>
</body>
</html>
